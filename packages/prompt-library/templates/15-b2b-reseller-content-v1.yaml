name: "B2B Reseller Content"
slug: "b2b-reseller-content-v1"
version: "1.0"
category: generation
content_type: b2b-content
channel: reseller
brand: soclean
description: "Business-to-business content targeting resellers, shop owners, and wholesale buyers"
purpose: >
  Generates content specifically for resellers (shop owners, Facebook Live sellers,
  online resellers) who buy SoClean by the carton. Content emphasises: carton pricing,
  customer satisfaction, resale-ability, delivery reliability, and margin.
  Delivered via LINE broadcast, Facebook reseller post, or direct message.
  Output is always DRAFT.
claim_safety_required: true
tags: [b2b, reseller, wholesale, carton, line, facebook, shop-owner]

variables:
  - name: content_purpose
    type: enum
    required: true
    description: "The primary goal of this B2B content piece"
    options:
      - "acquire-new-resellers"
      - "retain-existing-resellers"
      - "monthly-promo-broadcast"
      - "carton-deal-announcement"
      - "reseller-success-story"
      - "reorder-reminder"
    example: "acquire-new-resellers"
  - name: delivery_channel
    type: enum
    required: true
    description: "How this content will be sent to resellers"
    options: [LINE, Facebook, WhatsApp, direct-message]
    example: "LINE"
  - name: include_carton_specs
    type: boolean
    required: false
    default: true
    description: "Whether to include carton specifications (50 packs, 45,000 sheets)"
    example: true
  - name: promo_detail
    type: string
    required: false
    description: "Specific promotion or pricing detail (must be factual)"
    example: ""
  - name: reseller_testimonial
    type: string
    required: false
    description: "Real reseller testimonial to include (optional)"
    example: "ลูกค้าซื้อซ้ำทุกเดือน ขายง่ายมาก"
  - name: content_count
    type: integer
    required: false
    default: 2
    description: "Number of content variants (1–3)"
    example: 2

system_prompt: |
  You are a B2B marketing writer for SoClean by BN Paper, Thailand.
  Your audience is resellers: shop owners, Facebook Live sellers, mini-mart operators,
  and online resellers who buy SoClean by the carton.

  ## What Resellers Care About
  1. Margin — can they make money selling this?
  2. Sell-through — will their customers buy and come back?
  3. Reliability — will the supplier deliver on time, consistently?
  4. Return/complaint rate — will it create problems with customers?
  5. Brand recognition — is there social proof that makes the product easy to sell?

  ## B2B Content Tone
  - Business-friendly but warm — like a reliable supplier who values the relationship.
  - Direct about pricing and terms.
  - Use "ครับ/ค่ะ" to maintain politeness.
  - Not corporate or formal — Thai reseller culture is relationship-first.

  ## Key B2B Messaging
  - "สินค้ามีรีวิวดี ขายง่าย"
  - "ลูกค้าซื้อซ้ำ กำไรสม่ำเสมอ"
  - "ส่งเร็ว รับสินค้าได้ทันที สต็อกได้เลย"
  - "ยกลัง 50 แพ็ค ราคาส่ง"

  ## CRITICAL — CLAIM SAFETY RULES
  NEVER use: ไร้ฝุ่น 100%, dust-free, antibacterial, สะอาดที่สุด, นุ่มที่สุด, ดีที่สุด,
  อันดับ 1, ถูกที่สุด, ขายดีที่สุด (unless sourced), hypoallergenic, medically safe
  USE INSTEAD: ฝุ่นน้อย, เนียนนุ่ม, สินค้ามีรีวิวดี, ลูกค้าซื้อซ้ำ, คุ้มค่า

  ## Output Format
  Respond ONLY with a valid JSON object. No prose, no markdown.

user_prompt: |
  Generate B2B reseller content for SoClean.

  ## Input Variables
  - Content purpose: {{content_purpose}}
  - Delivery channel: {{delivery_channel}}
  - Include carton specs: {{include_carton_specs}}
  - Promo detail: {{promo_detail}}
  - Reseller testimonial: {{reseller_testimonial}}
  - Number of variants: {{content_count}}

  ## Requirements
  1. Write for resellers (B2B) — focus on margin, sell-through, reliability, and convenience.
  2. Tailor to {{content_purpose}}:
     - acquire-new-resellers: invite, highlight ease of selling + good reviews
     - retain-existing: thank them, highlight reorder ease + promotion
     - monthly-promo-broadcast: clear offer + carton specs + CTA
     - carton-deal: specs, pricing, delivery promise
     - reseller-success-story: embed testimonial + invite others
     - reorder-reminder: friendly nudge based on typical reorder cycle
  3. Match {{delivery_channel}} format:
     - LINE: 80–150 chars, conversational, can use emoji
     - Facebook: 100–200 chars, can be slightly longer
  4. If include_carton_specs: include "1 ลัง = 50 แพ็ค = 45,000 แผ่น"
  5. If reseller_testimonial provided: embed with attribution "ตัวแทนจำหน่าย SoClean"
  6. Verify all claims — reseller content must also be claim-safe.

  Return the JSON output now.

output_format: json
output_schema:
  type: object
  required: [content_pieces, compliance_check]
  properties:
    content_pieces:
      type: array
      items:
        type: object
        required: [variant, channel, purpose, body, character_count]
        properties:
          variant: { type: integer }
          channel: { type: string }
          purpose: { type: string }
          body: { type: string }
          character_count: { type: integer }
    compliance_check:
      type: object
      required: [approved_claims_used, prohibited_terms_detected, is_safe, pricing_requires_human_verification]
      properties:
        approved_claims_used: { type: array, items: { type: string } }
        prohibited_terms_detected: { type: array, items: { type: string } }
        is_safe: { type: boolean }
        pricing_requires_human_verification: { type: boolean }

example_input:
  content_purpose: "acquire-new-resellers"
  delivery_channel: "LINE"
  include_carton_specs: true
  promo_detail: ""
  reseller_testimonial: "ลูกค้าซื้อซ้ำทุกเดือน ขายง่ายมาก"
  content_count: 2

example_output:
  content_pieces:
    - variant: 1
      channel: "LINE"
      purpose: "acquire-new-resellers"
      body: |
        สวัสดีครับ/ค่ะ 🙏

        SoClean ทิชชู่ 2ชั้น 180แผ่น แพ็ค 5 กล่อง
        📦 ยกลัง 50 แพ็ค = 45,000 แผ่น — ราคาส่ง

        ✅ สินค้ามีรีวิวดีบน Shopee/Lazada
        ✅ ลูกค้าซื้อซ้ำ ขายง่าย กำไรดี
        ✅ ส่งเร็ว รับสินค้าได้ทันที

        "ลูกค้าซื้อซ้ำทุกเดือน ขายง่ายมาก" — ตัวแทนจำหน่าย SoClean

        สนใจทักมาได้เลยครับ/ค่ะ 📲
      character_count: 298
    - variant: 2
      channel: "LINE"
      purpose: "acquire-new-resellers"
      body: |
        เปิดรับตัวแทนจำหน่าย SoClean 📦

        ทิชชู่ฝุ่นน้อย เนียนนุ่ม มีรีวิวดี ลูกค้าซื้อซ้ำ
        1 ลัง = 50 แพ็ค ราคาส่ง สต็อกได้ทันที

        ทักมาสอบถามราคาและเงื่อนไขได้เลยครับ/ค่ะ 🙏
      character_count: 186
  compliance_check:
    approved_claims_used:
      - "สินค้ามีรีวิวดี"
      - "ลูกค้าซื้อซ้ำ"
      - "ฝุ่นน้อย"
      - "เนียนนุ่ม"
      - "ส่งเร็ว"
    prohibited_terms_detected: []
    is_safe: true
    pricing_requires_human_verification: true
