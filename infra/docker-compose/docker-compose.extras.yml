# Optional infrastructure — not required for current phases.
# Start with: docker compose -f docker-compose.yml -f docker-compose.extras.yml up -d
#
# Redis:   needed for Phase 05+ (caching, session, job queues)
# MinIO:   needed for Phase 06+ (content export, media storage)

services:

  redis:
    image: redis:7-alpine
    container_name: agento-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: agento-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agento}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-agento-secret}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  redis_data:
  minio_data:
