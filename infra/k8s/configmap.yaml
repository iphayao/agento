apiVersion: v1
kind: ConfigMap
metadata:
  name: agento-config
  namespace: agento
data:
  AI_BASE_URL: "https://api.openai.com/v1"
  AI_MODEL: "gpt-4o-mini"
  AI_PROVIDER: "openai"
  JWT_ENABLED: "true"
  JWT_EXPIRATION_SECONDS: "28800"
  AI_RATE_LIMIT: "10"
  LOG_LEVEL: "INFO"
  POSTGRES_DB: "agento"
  POSTGRES_USER: "agento"
