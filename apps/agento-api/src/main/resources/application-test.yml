spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

agento:
  security:
    api-key: ""
    jwt:
      enabled: false
      secret: test-secret-key-at-least-32-chars-long
  rate-limit:
    ai-calls-per-minute: 1000
  ai:
    api-key: test-key
    base-url: http://localhost:9999
    model: test-model
    temperature: 0.7
    max-tokens: 100
