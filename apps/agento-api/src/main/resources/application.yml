server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:postgresql://localhost:54320/agento
    username: ${POSTGRES_USERNAME:agento}
    password: ${POSTGRES_PASSWORD:agento}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

agento:
  security:
    api-key: ${AGENTO_API_KEY:}
  worker:
    base-url: ${WORKER_URL:http://localhost:8001}
    api-key: ${WORKER_API_KEY:}
    connect-timeout-seconds: ${WORKER_CONNECT_TIMEOUT:5}
    read-timeout-seconds: ${WORKER_READ_TIMEOUT:120}
    callback-base-url: ${API_CALLBACK_URL:http://localhost:8080/api}
  ai:
    api-key: ${AI_API_KEY:}
    base-url: ${AI_BASE_URL:https://api.openai.com/v1}
    model: ${AI_MODEL:gpt-4o-mini}
    temperature: ${AI_TEMPERATURE:0.7}
    max-tokens: ${AI_MAX_TOKENS:2000}
    connect-timeout-seconds: ${AI_CONNECT_TIMEOUT:5}
    read-timeout-seconds: ${AI_READ_TIMEOUT:60}

logging:
  level:
    com.bnpaper.agento: INFO
    org.flywaydb: INFO
