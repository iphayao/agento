server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:postgresql://localhost:54320/agento
    username: ${POSTGRES_USERNAME:agento}
    password: ${POSTGRES_PASSWORD:agento}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

agento:
  security:
    api-key: ${AGENTO_API_KEY:}
    keycloak:
      enabled: ${KEYCLOAK_ENABLED:false}
      issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/agento}

  rate-limit:
    ai-calls-per-minute: ${AI_RATE_LIMIT:10}

  worker:
    base-url: ${WORKER_URL:http://localhost:8001}
    api-key: ${WORKER_API_KEY:}
    connect-timeout-seconds: ${WORKER_CONNECT_TIMEOUT:5}
    read-timeout-seconds: ${WORKER_READ_TIMEOUT:120}
    callback-base-url: ${API_CALLBACK_URL:http://localhost:8080/api}
  ai:
    api-key: ${AI_API_KEY:}
    base-url: ${AI_BASE_URL:https://api.openai.com/v1}
    model: ${AI_MODEL:gpt-4o-mini}
    temperature: ${AI_TEMPERATURE:0.7}
    max-tokens: ${AI_MAX_TOKENS:2000}
    connect-timeout-seconds: ${AI_CONNECT_TIMEOUT:5}
    read-timeout-seconds: ${AI_READ_TIMEOUT:60}
  embedding:
    provider: ${EMBEDDING_PROVIDER:openai}
    model: ${EMBEDDING_MODEL:text-embedding-ada-002}
    api-key: ${EMBEDDING_API_KEY:${AI_API_KEY:}}
    base-url: ${EMBEDDING_BASE_URL:https://api.openai.com/v1}
    dimensions: ${EMBEDDING_DIMENSIONS:1536}
    connect-timeout-seconds: ${EMBEDDING_CONNECT_TIMEOUT:5}
    read-timeout-seconds: ${EMBEDDING_READ_TIMEOUT:30}

  storage:
    local-path: ${EXPORT_STORAGE_PATH:${java.io.tmpdir}/agento-exports}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      show-components: always
  health:
    db:
      enabled: true
    redis:
      enabled: false

logging:
  level:
    com.bnpaper.agento: INFO
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{correlationId}] %-5level %logger{36} — %msg%n"
