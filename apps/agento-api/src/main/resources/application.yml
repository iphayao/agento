spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:54320/agento}
    username: ${SPRING_DATASOURCE_USERNAME:agento}
    password: ${SPRING_DATASOURCE_PASSWORD:agento}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

agento:
  ai:
    provider: ${AI_PROVIDER:openai}
    base-url: ${AI_BASE_URL:https://api.openai.com}
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:gpt-4o-mini}
  web:
    cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

logging:
  level:
    com.bnpaper.agento: INFO
