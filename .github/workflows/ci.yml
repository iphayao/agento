name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:

  # ── Spring Boot ─────────────────────────────────────────────────────────────
  api-test:
    name: Spring Boot Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: agento_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ["54320:5432"]
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run unit tests (H2)
        working-directory: apps/agento-api
        run: mvn -B test -Dgroups="!integration"

      - name: Run integration tests (PostgreSQL + pgvector)
        working-directory: apps/agento-api
        run: mvn -B test -Dgroups="integration"
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:54320/agento_test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test

      - name: Build JAR
        working-directory: apps/agento-api
        run: mvn -B package -DskipTests

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: agento-api-jar
          path: apps/agento-api/target/agento-api-*.jar
          retention-days: 3

  # ── agento-worker ───────────────────────────────────────────────────────────
  worker-test:
    name: Python Worker Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/agento-worker/requirements.txt

      - name: Install dependencies
        working-directory: apps/agento-worker
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: apps/agento-worker
        run: python -m pytest tests/ -v --tb=short
        env:
          AI_API_KEY: test-key-not-used
          WORKER_API_KEY: ""
          AGENTO_API_KEY: ""

  # ── Next.js ─────────────────────────────────────────────────────────────────
  web-build:
    name: Next.js Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/agento-web/package-lock.json

      - name: Install dependencies
        working-directory: apps/agento-web
        run: npm ci

      - name: Lint
        working-directory: apps/agento-web
        run: npm run lint

      - name: Build
        working-directory: apps/agento-web
        run: npm run build
        env:
          API_URL: http://localhost:8080/api

  # ── Docker images ───────────────────────────────────────────────────────────
  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: [api-test, worker-test, web-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build agento-api image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/agento-api
          push: false
          tags: agento-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build agento-worker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/agento-worker
          push: false
          tags: agento-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build agento-web image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/agento-web
          push: false
          tags: agento-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
